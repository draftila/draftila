services:
  app:
    image: draftila/draftila:local
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DB_DRIVER: '${DB_DRIVER:-sqlite}'
      DATABASE_URL: '${DATABASE_URL:-file:/app/data/draftila.sqlite}'
      BETTER_AUTH_SECRET: '${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required - generate with: openssl rand -base64 32}'
      BETTER_AUTH_URL: '${BETTER_AUTH_URL:-http://localhost:3001}'
      FRONTEND_URL: '${FRONTEND_URL:-http://localhost:3001}'
      PORT: 3001
      STORAGE_DRIVER: '${STORAGE_DRIVER:-local}'
      STORAGE_PATH: '${STORAGE_PATH:-/app/data/storage}'
      TRUSTED_PROXY_IPS: '${TRUSTED_PROXY_IPS:-}'
      ADMIN_EMAIL: '${ADMIN_EMAIL:-}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-}'
      ADMIN_NAME: '${ADMIN_NAME:-Admin}'
    volumes:
      - draftila_data:/app/data
    restart: unless-stopped

volumes:
  draftila_data:
