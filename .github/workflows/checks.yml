name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Formatting
        run: bun run format:check

      - name: Typecheck API
        run: bun run --filter @draftila/api typecheck

      - name: Typecheck Web
        run: bun run --filter @draftila/web typecheck

      - name: Typecheck Website
        run: bun run --filter @draftila/website typecheck

      - name: Build Website
        run: bun run --filter @draftila/website build

      - name: Linting
        run: bun run lint

      - name: Engine tests
        run: bun run --filter @draftila/engine test

      - name: API tests
        run: bun run --filter @draftila/api test -- --coverage
        env:
          DB_DRIVER: sqlite
