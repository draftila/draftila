name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Formatting
        run: bun run format:check

      - name: Typecheck API
        run: bun run --filter @draftila/api typecheck

      - name: Typecheck Web
        run: bun run --filter @draftila/web typecheck

      - name: Typecheck Website
        run: bun run --filter @draftila/website typecheck

      - name: Build Website
        run: bun run --filter @draftila/website build

      - name: Linting
        run: bun run lint

      - name: Engine tests
        run: bun run --filter @draftila/engine test

      - name: API tests
        run: bun run --filter @draftila/api test -- --coverage
        env:
          DB_DRIVER: sqlite

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t draftila:ci .

      - name: Start container
        run: |
          docker run -d --name draftila-ci \
            -p 3001:3001 \
            -e BETTER_AUTH_SECRET=ci-test-secret-that-is-at-least-32-characters-long \
            -e BETTER_AUTH_URL=http://localhost:3001 \
            -e FRONTEND_URL=http://localhost:3001 \
            draftila:ci

      - name: Wait for healthy response
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health; then
              echo ""
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done
          echo "Health check failed after 60s"
          docker logs draftila-ci
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs draftila-ci
