name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      target:
        description: Branch name or tag version
        required: true
        type: string
      target_type:
        description: Use target as branch or version tag
        required: true
        default: branch
        type: choice
        options:
          - branch
          - version
      mark_latest:
        description: Also publish latest tag
        required: true
        default: false
        type: boolean

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_type == 'version' && format('refs/tags/{0}', inputs.target) || inputs.target }}

      - name: Ensure version tag exists
        if: inputs.target_type == 'version'
        run: git rev-parse "refs/tags/${{ inputs.target }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          tags="draftlia/draftlia:${{ inputs.target }}"
          if [ "${{ inputs.mark_latest }}" = "true" ]; then
            tags="$tags,draftlia/draftlia:latest"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
